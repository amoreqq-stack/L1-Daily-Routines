<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lesson 1 - Daily Routines</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f5f7f2;--w:#fff;--green:#4a9b6f;--gl:#e8f5ee;--gm:#c5e8d4;--bd:#e2e8dc;--ts:#8a9480;--text:#1a1f16}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--w);border-bottom:1px solid var(--bd);padding:0 1.5rem;display:flex;align-items:center;height:58px;gap:.3rem;position:sticky;top:0;z-index:100}
.nt{font-family:inherit;font-size:.76rem;font-weight:600;padding:.38rem .8rem;border-radius:7px;border:none;background:transparent;color:var(--ts);cursor:pointer}
.nt.on{background:var(--green);color:#fff}
.page{display:none;padding:1.75rem;max-width:1060px;margin:0 auto}
.page.on{display:block}
.card{background:var(--w);border:1px solid var(--bd);border-radius:14px;padding:1.35rem;margin-bottom:1rem}
</style>
</head>
<body>
<nav>
  <button class="nt on" onclick="go('overview')">Overview</button>
  <button class="nt" onclick="go('phase1')">Prep</button>
  <button class="nt" onclick="go('phase2')">Live Class</button>
  <button class="nt" onclick="go('practice')">Practice</button>
</nav>

<div class="page on" id="page-overview">
  <div class="card"><h1>Daily Routines</h1><p>Welcome! Use the tabs to navigate.</p></div>
</div>
<div class="page" id="page-phase1">
  <div class="card"><h2>Phase 1: Preparation</h2><p>Content for Prep.</p></div>
</div>
<div class="page" id="page-phase2">
  <div class="card"><h2>Phase 2: Live Class</h2><p>Content for Live Class.</p></div>
</div>
<div class="page" id="page-practice">
  <div class="card"><h2>Practice Tasks</h2><p>Content for Practice.</p></div>
</div>

<script>
function go(id) {
  // 1. Hide all pages
  var pages = document.querySelectorAll('.page');
  pages.forEach(function(p) { p.classList.remove('on'); });
  
  // 2. Deactivate all tabs
  var tabs = document.querySelectorAll('.nt');
  tabs.forEach(function(t) { t.classList.remove('on'); });

  // 3. Show the target page (matches 'page-overview', etc)
  var target = document.getElementById('page-' + id);
  if (target) {
    target.classList.add('on');
  }

  // 4. Activate the button
  var m = {overview:0, phase1:1, phase2:2, practice:3};
  if (m[id] !== undefined && tabs[m[id]]) {
    tabs[m[id]].classList.add('on');
  }
}
</script>
</body>
</html>
