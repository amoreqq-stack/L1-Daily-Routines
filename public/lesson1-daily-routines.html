<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lesson 1 - Daily Routines</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f5f7f2;--w:#fff;--green:#4a9b6f;--gl:#e8f5ee;--gm:#c5e8d4;--bd:#e2e8dc;--ts:#8a9480;--text:#1a1f16}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--w);border-bottom:1px solid var(--bd);padding:0 1.5rem;display:flex;align-items:center;height:58px;gap:.3rem;position:sticky;top:0;z-index:100}
.nt{font-family:inherit;font-size:.76rem;font-weight:600;padding:.38rem .8rem;border-radius:7px;border:none;background:transparent;color:var(--ts);cursor:pointer}
.nt.on{background:var(--green);color:#fff}
.page{display:none;padding:1.75rem;max-width:1060px;margin:0 auto}
.page.on{display:block}
.card{background:var(--w);border:1px solid var(--bd);border-radius:14px;padding:1.35rem;margin-bottom:1rem}
</style>
</head>
<body>
<nav>
  <button class="nt on" onclick="go('overview')">Overview</button>
  <button class="nt" onclick="go('phase1')">Prep</button>
  <button class="nt" onclick="go('phase2')">Live Class</button>
  <button class="nt" onclick="go('practice')">Practice</button>
</nav>

<div class="page on" id="page-overview">
  <div class="card"><h1>Daily Routines</h1><p>Welcome! Your tabs are now fixed.</p></div>
</div>
<div class="page" id="page-phase1">
  <div class="card"><h2>Phase 1: Preparation</h2><p>Lexical chunks content.</p></div>
</div>
<div class="page" id="page-phase2">
  <div class="card"><h2>Phase 2: Live Class</h2><p>Live discussion content.</p></div>
</div>
<div class="page" id="page-practice">
  <div class="card"><h2>Practice Tasks</h2><p>Interactive games content.</p></div>
</div>

<script>
// THIS FUNCTION IS NOW REWRITTEN TO BE BULLETPROOF
function go(id) {
  console.log("Navigating to:", id);
  
  // 1. Remove 'on' class from all pages
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) {
    pages[i].classList.remove('on');
  }
  
  // 2. Remove 'on' class from all tabs
  var tabs = document.querySelectorAll('.nt');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('on');
  }

  // 3. Show the specific page
  var targetId = 'page-' + id;
  var targetPage = document.getElementById(targetId);
  if (targetPage) {
    targetPage.classList.add('on');
  } else {
    console.error("Could not find page with ID:", targetId);
  }

  // 4. Set the active tab
  var menuMap = { 'overview': 0, 'phase1': 1, 'phase2': 2, 'practice': 3 };
  var index = menuMap[id];
  if (index !== undefined && tabs[index]) {
    tabs[index].classList.add('on');
  }
}
</script>
</body>
</html>
